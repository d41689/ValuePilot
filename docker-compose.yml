name: valuepilot-dev

services:
  db:
    image: postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: valuepilot
      POSTGRES_PASSWORD: valuepilot
      POSTGRES_DB: valuepilot
    volumes:
      - ./storage/postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U valuepilot -d valuepilot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - shared-infra

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_WEB_PORT:-3001}:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0", "--port", "3000"]
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_API_PORT:-8001}:8000"
    environment:
      DATABASE_URL: postgresql://valuepilot:valuepilot@db:5432/valuepilot
    volumes:
      - ./backend:/code
      - ./docs:/code/docs
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - shared-infra

networks:
  shared-infra:
    external: true
    name: projects-shared
