

---
# ValuePilot Metric Facts Mapping Spec
# Purpose:
# - Map source JSON paths -> canonical metric_key + period_type + unit + value selection
# - Keep metric_key canonical (no USD/pct/millions/per_share in the key)
# - Express units via `unit`
# - Express time semantics via `period_type` + `period_end_date`
#
# Canonical conventions
# - metric_key: dotted namespace + snake_case, e.g. per_share.eps, is.net_income
# - unit: enumerated strings (see `enums.units`)
# - period_type: enumerated strings (see `enums.period_types`)
# - period_end_date sourcing:
#   * FY/Q: derived from year/quarter end
#   * AS_OF/EVENT: use the source module's as_of / event date; stored in period_end_date

version: 1

enums:
  period_types:
    # Financial statement periods
    - FY               # fiscal year
    - Q                # quarter
    - TTM              # trailing twelve months
    - YTD              # year-to-date
    # Point-in-time snapshots
    - AS_OF            # snapshot at a date (stored in period_end_date)
    # Events
    - EVENT            # event occurrence date (stored in period_end_date)
    # Targets and projections
    - TARGET_HORIZON   # e.g., 18-month target ranges
    - PROJECTION_RANGE # multi-year projection ranges
    - PROJ_FY          # projected fiscal year

  units:
    # Currency
    - USD
    - USD_millions
    - USD_per_share
    # Counts
    - shares
    - million_shares
    # Rates / ratios
    - percent
    - ratio
    # Text / categorical
    - text

# Global defaults (can be overridden per mapping)
defaults:
  source:
    report_date_path: meta.report_date
  value_preference:
    # Prefer numeric when available, otherwise text, otherwise json
    - numeric
    - text
    - json

# Helpers: where to find common dates in the source JSON
# (these are path strings; your parser can interpret them)
date_paths:
  report_date: meta.report_date
  recent_price_as_of: meta.report_date
  capital_structure_as_of: capital_structure.as_of
  market_cap_as_of: capital_structure.market_cap.as_of
  common_stock_as_of: capital_structure.common_stock.as_of
  timeliness_event_date: ratings.timeliness.event.date
  safety_event_date: ratings.safety.event.date
  technical_event_date: ratings.technical.event.date

# ============================================================
# MAPPINGS
# Each item in `mappings` describes how to extract one or many facts.
#
# Required fields:
# - id: stable identifier for the mapping
# - json_path: path pattern into source JSON
# - metric_key: canonical key
# - period_type: FY/Q/AS_OF/etc.
# - unit: one of enums.units
#
# Optional fields:
# - period_end_date:
#     - from: json path for a date
#     - derive: derivation rule name (year_end, quarter_end, etc.)
# - value:
#     - numeric_from: json path
#     - text_from: json path
#     - json_from: json path
# - metric_key_template:
#     - format string for dynamic keys, e.g. rates.{metric_key}.cagr_10y
# - metric_key_from:
#     - relative path used to fill metric_key_template (e.g. metric_key)
# - transforms: list of transforms to apply
# - notes: free-form text
# ============================================================

mappings:
  # -------------------------
