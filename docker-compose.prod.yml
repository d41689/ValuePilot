name: valuepilot-prod

services:
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.prod
    ports:
      - "${HOST_WEB_PORT:-3101}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    networks:
      - default
    depends_on:
      api:
        condition: service_started
    command: >
      sh -c "npm run build &&
             mkdir -p .next/standalone/.next &&
             rm -rf .next/standalone/.next/static &&
             cp -R .next/static .next/standalone/.next/static &&
             if [ -d public ]; then
               rm -rf .next/standalone/public &&
               cp -R public .next/standalone/public;
             fi &&
             cd .next/standalone &&
             HOSTNAME=0.0.0.0 PORT=3000 node server.js"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.prod
    ports:
      - "${HOST_API_PORT:-8101}:8000"
    environment:
      DATABASE_URL: postgresql://${VALUEPILOT_DB_USER:-valuepilot}:${VALUEPILOT_DB_PASSWORD:-valuepilot}@postgres:5432/${VALUEPILOT_PROD_DB:-valuepilot_prod}
    volumes:
      - ./docs:/code/docs:ro
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    networks:
      - default
      - shared-infra

networks:
  shared-infra:
    external: true
    name: projects-shared
