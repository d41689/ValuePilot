name: valuepilot-prod

services:
  db:
    image: postgres:15
    restart: unless-stopped
    command: ["sleep", "infinity"]
    environment:
      PGHOST: postgres
      PGUSER: valuepilot
      PGPASSWORD: valuepilot
      PGDATABASE: valuepilot_prod
    networks:
      - shared-infra

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.prod
    ports:
      - "${HOST_WEB_PORT:-3101}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      - api
    command: >
      sh -c "npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
      - .env.prod
    ports:
      - "${HOST_API_PORT:-8101}:8000"
    environment:
      DATABASE_URL: postgresql://valuepilot:valuepilot@postgres:5432/valuepilot_prod
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      - db
    networks:
      - default
      - shared-infra

networks:
  shared-infra:
    external: true
    name: projects-shared
